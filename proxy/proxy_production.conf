map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

#
# IP SERVERA — bez przekierowania na domenę
#
server {
  listen 80;
  server_name 188.252.84.185;

  location / {
    proxy_pass http://frontend-new:3000;

    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

#
# WWW -> bez WWW
#
server {
  listen 80;
  server_name www.dks.pl;

  return 301 https://dks.pl$request_uri;
}

#
# HTTP -> HTTPS
#
server {
  listen 80;
  server_name dks.pl;

  return 301 https://dks.pl$request_uri;
}

#
# HTTPS WWW -> bez WWW
#
server {
  listen 443 ssl;
  server_name www.dks.pl;

  ssl_certificate     /etc/nginx/certs/certyfikat_ssl_bundle_dla_dkspl_MKtnc2025.crt;
  ssl_certificate_key /etc/nginx/certs/dks.pl_new.key;

  ssl_protocols TLSv1.2 TLSv1.3;

  return 301 https://dks.pl$request_uri;
}

#
# GŁÓWNA KONFIGURACJA HTTPS
#
server {
  listen 443 ssl;
  server_name dks.pl;

  ssl_certificate     /etc/nginx/certs/certyfikat_ssl_bundle_dla_dkspl_MKtnc2025.crt;
  ssl_certificate_key /etc/nginx/certs/dks.pl_new.key;

  ssl_protocols TLSv1.2 TLSv1.3;

  server_tokens off;
  client_max_body_size 50m;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  #
  # PRZEKIEROWANIA
  #
  rewrite ^/oferta/komputery/?$ https://dks.pl/oferta/komputery-stacjonarne permanent;
  rewrite ^/baza-wiedzy/?$ https://dks.pl/blog/serwis permanent;
  rewrite ^/oferta/kamery-termowizyjne/?$ https://dks.pl/oferta/rozwiazania-video permanent;
  rewrite ^/oferta/kamery-termowizyjne/.+$ https://dks.pl/oferta/rozwiazania-video permanent;

  rewrite ^/oferta/produkty/(skladarki-wielkoformatowe|software-wielkoformatowe|skanery-wielkoformatowe|plotery-mfp|plotery-drukarki)/?$ https://dks.pl/oferta/rozwiazania-wielkoformatowe permanent;

  rewrite ^/oferta/produkty/(introligatornia|uszlachetnianie-druku|software-dla-poligrafii|maszyny-rolowe-etykiety|maszyny-produkcyjne-bw|maszyny-produkcyjne-kolorowe)/?$ https://dks.pl/oferta/rozwiazania-dla-poligrafii permanent;

  rewrite ^/oferta/produkty/laptopy/?$ https://dks.pl/oferta/laptopy permanent;
  rewrite ^/oferta/produkty/komputery-stacjonarne/?$ https://dks.pl/oferta/komputery-stacjonarne permanent;

  rewrite ^/oferta/produkty/oprogramowanie-dla-biura/?$ https://dks.pl/oferta/oprogramowanie-dla-biura permanent;

  rewrite ^/oferta/produkty/oprogramowanie-do-druku/?$ https://dks.pl/oferta/oprogramowanie-dla-poligrafii-i-cad-gis permanent;

  rewrite ^/oferta/rozwiazania-dla-biura/(canon|konica-minolta|hp|lexmark|ricoh)/?$ https://dks.pl/oferta/marki/$1 permanent;

  rewrite ^/oferta/rozwiazania-dla-poligrafii/(duplo|canon|konica-minolta)/?$ https://dks.pl/oferta/marki/$1 permanent;

  rewrite ^/oferta/rozwiazania-wielkoformatowe/(konica-minolta|canon|oce|es-te|kip|contex)/?$ https://dks.pl/oferta/marki/$1 permanent;

  rewrite ^/oferta/laptopy/(asus|hp|lenovo)/?$ https://dks.pl/oferta/marki/$1 permanent;

  rewrite ^/oferta/komputery/drukarki-i-urzadzenia-wielofunkcyjne/?$ https://dks.pl/oferta/komputery-stacjonarne permanent;

  rewrite ^/oferta/(rozwiazania-dla-biura|rozwiazania-dla-poligrafii|rozwiazania-wielkoformatowe|laptopy|komputery|tablice-interaktywne|materialy-eksploatacyjne|oprogramowanie-dla-biura|oprogramowanie-dla-poligrafii-i-cad-gis)/(?!drukarki-i-urzadzenia-wielofunkcyjne|oprogramowanie-do-druku|oprogramowanie-dla-biura|komputery-stacjonarne|laptopy|maszyny-produkcyjne-kolorowe|maszyny-produkcyjne-bw|maszyny-rolowe-etykiety|software-dla-poligrafii|uszlachetnianie-druku|introligatornia|plotery-drukarki|plotery-mfp|skanery-wielkoformatowe|software-wielkoformatowe|skladarki-wielkoformatowe)([^/]+)/?$ https://dks.pl/oferta/produkty/$2 permanent;

  #
  # BACKEND / DIRECTUS
  #
  location = /backend {
    return 301 /backend/;
  }

  location ^~ /backend/ {
    proxy_pass http://directus:8055/;

    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /backend;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  #
  # FRONTEND NEXT.JS
  #
  location / {
    proxy_pass http://frontend-new:3000;

    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
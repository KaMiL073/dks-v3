map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

#
# IP SERVERA — bez przekierowania na domenê
#
server {
  listen 80;
  server_name 188.252.84.185;

  location / {
    proxy_pass http://frontend-new:3000;

    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

#
# WWW -> bez WWW
#
server {
  listen 80;
  server_name www.dks.pl;

  return 301 https://dks.pl$request_uri;
}

#
# HTTP -> HTTPS
#
server {
  listen 80;
  server_name dks.pl;

  return 301 https://dks.pl$request_uri;
}

#
# HTTPS WWW -> bez WWW
#
server {
  listen 443 ssl;
  server_name www.dks.pl;

  ssl_certificate     /etc/nginx/certs/certyfikat_ssl_bundle_dla_dkspl_MKtnc2025.crt;
  ssl_certificate_key /etc/nginx/certs/dks.pl_new.key;

  ssl_protocols TLSv1.2 TLSv1.3;

  return 301 https://dks.pl$request_uri;
}


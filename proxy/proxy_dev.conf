# poprawne Connection dla websocketów
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  server_name 188.252.84.172 localhost _;

  server_tokens off;
  client_max_body_size 50m;

  # Jeśli nginx jest w dockerze i używasz nazw serwisów jako upstream
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # ================================
  # Directus pod /backend/
  # ================================

  # /backend -> /backend/
  location = /backend {
    return 301 /backend/;
  }

  # /backend/ -> Directus (wszystko pod prefiksem)
  location ^~ /backend/ {
    proxy_pass http://directus:8055/;
    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # ważne dla działania Directusa pod prefiksem
    proxy_set_header X-Forwarded-Prefix /backend;

    # websockets
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # ================================
  # Next.js (frontend-new)
  # ================================

  # Jeśli masz API w Next
  location ^~ /api/ {
    proxy_pass http://frontend-new:3000;
    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # websockets (np. dev / inne)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # Reszta -> Next
  location / {
    proxy_pass http://frontend-new:3000;
    proxy_http_version 1.1;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}